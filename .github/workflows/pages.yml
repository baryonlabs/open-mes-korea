name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify IndexNow
        continue-on-error: true
        run: |
          curl --fail --silent --show-error --retry 3 \
            "https://api.indexnow.org/indexnow?url=https%3A%2F%2Fbaryonlabs.github.io%2Fopen-mes-korea%2F&key=5104afde7a98c20355688669b6d2d1f3&keyLocation=https%3A%2F%2Fbaryonlabs.github.io%2Fopen-mes-korea%2F5104afde7a98c20355688669b6d2d1f3.txt"
