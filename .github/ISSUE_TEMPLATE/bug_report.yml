name: Bug report
description: Report reproducible incorrect behavior.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Open MES Korea is in early implementation. Please avoid including customer data, credentials, or private factory details.
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest repeatable sequence.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, runtime, database, and deployment details.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
